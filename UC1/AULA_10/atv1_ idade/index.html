<script>
    let idade = prompt("digite sua idade")

    while (idade !== null && idade !== "") {
        if (idade < 0) {
            alert("idade inválida " + idade)
        } else if (idade < 12) {
            alert("criança " + idade)
        } else if (idade < 18) {
            alert("adolescente " + idade)
        } else if (idade < 60) {
            alert("adulto " + idade)
        } else {
            alert("idoso " + idade)

        }
        idade = prompt("digite sua idade")
    }

    alert("operação cancelada")


































</script>
