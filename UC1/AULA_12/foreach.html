<script>
    let produtos = [
        "COMPUTADORES",
        "MONITORES",
        "TECLADO",
        "MOUSE"
    ]

    let icones = [
        "🖥️",
        "💻",
        "⌨️",
        "🖱️"
    ]

   let resultado = "LISTA DE PRODUTOS"
    resultado +="\n";

    produtos.forEach(function(nomedoproduto,i){
        resultado += `${icones[i]}.${nomedoproduto} posição: ${i}\n`
    })

    alert(resultado)


   
    
</script>
